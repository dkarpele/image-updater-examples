apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app-001
      component: argocd
  template:
    metadata:
      labels:
        app: test-app-001
        component: argocd
    spec:
      imagePullSecrets:
        - name: e2e-registry-pull-secret
      containers:
      - name: test
        image: 127.0.0.1:30000/test-image:1.0.0

