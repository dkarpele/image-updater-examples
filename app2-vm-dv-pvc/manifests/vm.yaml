apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: example-vm2
  namespace: demo
spec:
  running: true
  dataVolumeTemplates:
    - metadata:
        name: example-vm2-disk-boot
      spec:
        source:
          pvc:
            namespace: vm-templates
            name: base-image-latest
        storage:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 50Gi
          storageClassName: standard
  template:
    spec:
      domain:
        cpu:
          cores: 2
          sockets: 1
        memory:
          guest: 4Gi
        devices:
          disks:
            - name: disk-boot
              disk:
                bus: virtio
      volumes:
        - name: disk-boot
          dataVolume:
            name: example-vm2-disk-boot
