apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app2-vm-dv-pvc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dkarpele/image-updater-examples
    targetRevision: HEAD
    path: app2-vm-dv-pvc/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated: {}
